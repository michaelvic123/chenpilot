name: Announce Release

on:
  release:
    types: [published]

jobs:
  announce:
    runs-on: ubuntu-latest
    if: "!github.event.release.draft && !github.event.release.prerelease"

    steps:
      - name: Send release announcement to bot
        run: |
          curl -s -X POST "${{ secrets.BOT_WEBHOOK_URL }}/github/release" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: release" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '${{ toJson(github.event) }}' | openssl dgst -sha256 -hmac '${{ secrets.GITHUB_WEBHOOK_SECRET }}' | awk '{print $2}')" \
            -d '${{ toJson(github.event) }}'
